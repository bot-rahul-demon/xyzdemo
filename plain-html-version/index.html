<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MockSaathi - Free Mock Tests for Government Exams</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app"></div>

    <!-- SVG Icons (for lucide-react replacements) -->
    <svg style="display: none;">
        <defs>
            <symbol id="icon-home" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
            </symbol>
            <symbol id="icon-book" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none">
                <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
            </symbol>
            <symbol id="icon-briefcase" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none">
                <rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"></path>
            </symbol>
            <symbol id="icon-train" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none">
                <rect x="3" y="3" width="18" height="13" rx="2" ry="2"></rect><path d="M3 16h18M6 9h1M11 9h1M16 9h1"></path>
            </symbol>
            <symbol id="icon-building" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none">
                <path d="M18 4v16M4 4v16M4 4h16"></path><path d="M8 8h1v1H8zM8 12h1v1H8zM8 16h1v1H8zM13 8h1v1h-1zM13 12h1v1h-1zM13 16h1v1h-1z"></path>
            </symbol>
            <symbol id="icon-users" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
            </symbol>
            <symbol id="icon-clock" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none">
                <circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline>
            </symbol>
            <symbol id="icon-target" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none">
                <circle cx="12" cy="12" r="1"></circle><circle cx="12" cy="12" r="5"></circle><circle cx="12" cy="12" r="9"></circle>
            </symbol>
            <symbol id="icon-trophy" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none">
                <path d="M6 9H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v2a2 2 0 0 1-2 2h-2"></path><path d="M6 9c0 1 .895 2.795 2.519 4.686"></path><path d="M18 9c0 1-.895 2.795-2.519 4.686"></path><path d="M9 13.5h6"></path><path d="M9 13.5v3a1 1 0 0 0 1 1h4a1 1 0 0 0 1-1v-3"></path>
            </symbol>
            <symbol id="icon-play" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none">
                <polygon points="5 3 19 12 5 21 5 3"></polygon>
            </symbol>
            <symbol id="icon-chevron-down" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none">
                <polyline points="6 9 12 15 18 9"></polyline>
            </symbol>
            <symbol id="icon-chevron-right" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none">
                <polyline points="9 18 15 12 9 6"></polyline>
            </symbol>
            <symbol id="icon-flag" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none">
                <path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1"></path><line x1="4" y1="22" x2="4" y2="15"></line>
            </symbol>
            <symbol id="icon-chevron-left" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none">
                <polyline points="15 18 9 12 15 6"></polyline>
            </symbol>
            <symbol id="icon-shield" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
            </symbol>
            <symbol id="icon-award" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none">
                <circle cx="12" cy="8" r="7"></circle><polyline points="8 14 12 17 16 14"></polyline><line x1="12" y1="17" x2="12" y2="23"></line><line x1="9" y1="23" x2="15" y2="23"></line>

            <symbol id="icon-check" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none">
                <polyline points="20 6 9 17 4 12"></polyline>
            </symbol>
            <symbol id="icon-radio" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none">
                <circle cx="12" cy="12" r="1"></circle><path d="M12 7a5 5 0 1 0 0 10 5 5 0 0 0 0-10"></path><path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20"></path>
            </symbol>
            <symbol id="icon-menu" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none">
                <line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="18" x2="21" y2="18"></line>
            </symbol>
            <symbol id="icon-x" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none">
                <line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line>
            </symbol>
            <symbol id="icon-share" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none">
                <circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
            </symbol>
            <symbol id="icon-trending" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none">
                <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline><polyline points="17 6 23 6 23 12"></polyline>
            </symbol>
            <symbol id="icon-crown" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none">
                <path d="M6 9l6-6 6 6M6 9h12M6 9l1.5 10.5h9l1.5-10.5"></path>
            </symbol>
        </defs>

    <script src="app.js"></script>
</body>
</html>
